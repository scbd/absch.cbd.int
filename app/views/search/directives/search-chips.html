<div style="margin-bottom:20px">

    <style>
        .chip > .input-group-addon  {
            background-color: #ddd;
        }

        .chip-active > .input-group-addon  {
            background-color: #ddd!important;
            box-shadow: inset 0 3px 3px rgba(0,0,0,.150);
        }
    </style>


    <p style="text-transform:uppercase;color:#bbb;font-weight:bold; padding-bottom:5px;">
        active filters</p>

    <div ng-repeat="filter in setFilters" style="margin-bottom: 5px;">

        <div class="row">
            <div class="col-xs-12">

                <!-- edit free text -->
                <div ng-if="filter.edit" class="input-group edit" style="position: absolute;z-index: 100;">
                    <input type="textbox" ng-model="filter.editValue" ng-keydown="onKeyDown($event, filter)"
                        class="form-control form-control-small">
                    <span class="btn btn-xs bold filter-chips-edit-addon input-group-addon" title="Save filter"
                        ng-click="onEditFreeTextFilterDone(filter)">
                        <i class="fa fa-check"></i>
                    </span>
                    <span class="btn btn-xs bold filter-chips-edit-addon input-group-addon" title="Close editing"
                        ng-click="onEditFreeTextFilterCanceled(filter)">
                        <i class="fa fa-times"></i>
                    </span>
                </div>

                <div class="input-group chip " ng-if="!filter.edit"  ng-class="{'chip-active': showFilters===filter.id}">

                    <span class="input-group-addon " style="text-align:left;padding:5px;">
                        <span>
                            <!-- filter checkbox -->
                            <span class="bold dropdown" style="cursor: pointer" type="button" data-toggle="dropdown"
                                aria-haspopup="true" aria-expanded="true" ng-if="!filter.edit">
                                <i class="fa fa-check-square" ng-if="!filter.excludeResult && !filter.disabled "
                                    aria-hidden="true"></i>
                                <i class="fa fa-minus-square" ng-if="filter.excludeResult" aria-hidden="true"></i>
                                <i class="fa fa-eye-slash" ng-if="filter.disabled" aria-hidden="true"></i>
                            </span>

                            <ul class="dropdown-menu filter-chip-settings" style="top:20px;left:-5px;"
                                ng-if="!filter.edit && filter.type!='date'">
                                <li ng-if="filter.type=='freeText'">
                                    <a rel="noopener" href="#" ng-click="onEditFreeTextFilter(filter)"><i
                                            class="fa fa-edit" aria-hidden="true"></i> Edit filter</a>
                                </li>
                                <li>
                                    <a rel="noopener" href="#" ng-if="!filter.disabled"
                                        ng-click="filter.disabled=true;recordSelected();">
                                        <i class="fa fa-eye-slash" aria-hidden="true"></i> Disable</a>
                                </li>
                                <li>
                                    <a rel="noopener" href="#" ng-if="filter.disabled"
                                        ng-click="filter.disabled=false;recordSelected();">
                                        <i class="fa fa-eye" aria-hidden="true"></i> Enable</a>
                                </li>
                                <li>
                                    <a rel="noopener" href="#" ng-if="!filter.excludeResult"
                                        ng-click="filter.excludeResult=true;recordSelected();">
                                        <i class="fa fa-minus-square" aria-hidden="true"></i> Exclude results</a>
                                </li>
                                <li>
                                    <a rel="noopener" href="#" ng-if="filter.excludeResult"
                                        ng-click="filter.excludeResult=false;recordSelected();">
                                        <i class="fa fa-plus-square" aria-hidden="true"></i> Include results</a>
                                </li>
                                <li>
                                    <a rel="noopener" href="#" ng-click="removeFilter(filter)">
                                        <i class="fa fa-times" aria-hidden="true"></i> Remove </a>
                                </li>
                            </ul>
                        </span>

                    </span>

                    <div class="input-group-addon "
                        style="cursor: pointer;padding:3px;margin:0;text-align:left;width:100%;border-right: 0;"
                        ng-click="getScope().showFilters != filter.id ? getScope().showFilters=filter.id :  getScope().showFilters = false">
                        <!-- filter name -->
                        <span
                            style="font-size: 10px;text-transform: uppercase;font-weight:bold;color:#666;white-space:normal;"
                            ng-bind="filter.name|lstring:locale"></span>

                        <!-- <div ng-repeat="subfilter in getScope().leftMenuFilters[filter.id].selectedItems" style="display:block;margin:5px 0;" class="label label-selected-facet bg-blue">
                        {{subfilter}}
                    </div> -->

                    </div>
                    <div class="input-group-addon "
                        style="cursor: pointer;padding:3px;margin:0;text-align:right;border-left:0!important;"
                        ng-click="getScope().showFilters != filter.id ? getScope().showFilters=filter.id :  getScope().showFilters = false">
                        <!-- arrow -->
                        <span style="font-size:12px;font-weight:bold;color:#666">
                            <i ng-if="!showFilters || showFilters!=filter.id" class="fa fa-caret-right"></i>
                            <i ng-if="showFilters===filter.id" class="fa fa-times-circle color-black"></i>
                        </span>
                    </div>

                </div><!-- /input-group -->
            </div><!-- /.col -->

        </div><!-- /.row -->

    </div>
