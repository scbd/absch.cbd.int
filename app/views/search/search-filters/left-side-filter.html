<div style="margin-top:30px;">
    <div ng-if="leftMenuFilters" id="Search-Filter" class="left-menu-filters" style="background-color: inherit;">

        <ul class="list-group" ng-if="showFilters">
            <li class="list-group-item no-left-right-bottom-border"
                style=" cursor: pointer;padding:0px; background-color:inherit;"
                ng-repeat="(schema, filters) in leftMenuFilters" ng-if="filters" ng-if="showFilters==schema">

                
                <div ng-if="showFilters==schema">

                <div class="dropdown pull-left bring-to-front1">
                    <button class="btn btn-xs btn-default dropdown-toggle ;" type="button" data-toggle="dropdown"
                        aria-haspopup="true" aria-expanded="true" style="background-color:inherit;border: none;vertical-align: unset;">
                        <i class="fa fa-cog" aria-hidden="true"></i>
                    </button>
                    <ul class="dropdown-menu search-filter-settings" aria-labelledby="dropdownMenu1">
                        <li><a rel="noopener" href="#" ng-if="!filter.disabled" ng-click="filter.disabled=true">
                                <i class="fa fa-eye" aria-hidden="true"></i>  Disable</a></li>
                        <li><a rel="noopener" href="#" ng-if="filter.disabled" ng-click="filter.disabled=false">
                                <i class="fa fa-eye-slash" aria-hidden="true"></i> Enable</a></li>
                        <li><a rel="noopener" href="#" ng-click="clearFilterOptions(schema)">
                                <i class="fa fa-times-circle" aria-hidden="true"></i> Clear all </a></li>
                        <li><a rel="noopener" href="#">
                                <i class="fa fa-trash" aria-hidden="true"></i> Remove</a></li>
                    </ul>
                </div>
                
                <div class="bold color-darkgrey"
                    style="cursor: pointer;padding-left:2px;padding-right:2px;padding-bottom:5px;"
                    ng-click="state[schema]=!state[schema]">
                    <span ng-bind="schema | schemaName"></span>
                    <!-- <i class="fa pull-right" style="font-size:1.5em; "
                        ng-class="{'fa-sort-down':state[schema], 'fa-sort-up':!state[schema]}"></i> -->
                </div>
                <div class="list-group-item filter-item" style="background-color:inherit;" ng-repeat="filter in filters" ng-show="!state[schema]">

                    <div class="dropdown pull-left bring-to-front"
                        ng-if="filter.filterValue!=undefined||hasItems(filter.selectedItems)">
                        <button class="btn btn-xs btn-default dropdown-toggle" type="button" data-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="true" style="border: none;vertical-align: unset;">
                            <i class="fa fa-cog" aria-hidden="true"></i>
                        </button>
                        <ul class="dropdown-menu search-filter-settings">
                            <li><a rel="noopener" href="#" ng-if="!filter.disabled"
                                    ng-click="filter.disabled=true;recordSelected();">
                                    <i class="fa fa-eye" aria-hidden="true"></i>  Disable</a></li>
                            <li><a rel="noopener" href="#" ng-if="filter.disabled"
                                    ng-click="filter.disabled=false;recordSelected();">
                                    <i class="fa fa-eye-slash" aria-hidden="true"></i> Enable</a></li>
                            <li><a rel="noopener" href="#" ng-if="!filter.excludeResult"
                                    ng-click="filter.excludeResult=true;recordSelected();">
                                    <i class="fa fa-minus-square-o" aria-hidden="true"></i> Exclude results</a></li>
                            <li><a rel="noopener" href="#" ng-if="filter.excludeResult"
                                    ng-click="filter.excludeResult=false;recordSelected();">
                                    <i class="fa fa-plus-square-o" aria-hidden="true"></i> Include results</a></li>
                            <li><a rel="noopener" href="#"
                                    ng-click="clearFilterOptions(schema, filter);filter.disabled=false;filter.excludeResult=false;">
                                    <i class="fa fa-times-circle" aria-hidden="true"></i> Clear all</a></li>
                        </ul>
                    </div>
                    <div>
                        <div ng-if="filter.type!='solrRecords' && filter.type!='date' && filter.type!='freeText' && filter.type!='yesNo'"
                            class="color-darkgrey not" style="cursor: pointer;"
                            ng-click="showFilterDialog(schema, filter, searchResult.data.facets.keywords)"
                            ng-class="{'disabled strikeout':filter.disabled}">
                            <div ng-class="{'exclude-filter':filter.excludeResult}">
                                <span ng-if="filter.excludeResult" class="label label-danger"
                                    style="border-bottom: 1px solid;">NOT</span>
                                <span ng-bind="filter.title"></span>
                                <span class="fa fa-chevron-right pull-right"></span>
                                <!-- <i class="fa fa-chevron-right pull-right" style="margin-top:5px" aria-hidden="true"></i>           -->
                            </div>
                        </div>
                        <div ng-if="filter.type=='date'">
                            <label ng-bind="filter.title" ng-class="{'disabled strikeout':filter.disabled}"></label>
                            <button ng-if="filter.filterValue" class="btn btn-xs btn-default pull-right"
                                ng-click="clearFilterDate(filter)">clear</button>
                            <div km-date-range ng-model="filter.filterValue" ng-change="onFilterDateChange(filter)">
                            </div>
                            <div ng-if="filter.type=='solrRecords'">
                                <div block-region activate="filter.disabled" skip-loading-icon="true" style="position: relative;">                                    
                                    <div ng-class="{'exclude-filter':filter.excludeResult}">
                                        <span ng-if="filter.excludeResult" class="label label-danger" style="border-bottom: 1px solid;">NOT</span>
                                        <div document-selector identifier-without-revision="true" ng-model="filter.selectedItems" question="searchResult" type="checkbox"
                                            on-build-query="onBuildQuery(searchText, tab, filter)" 
                                            lookup-field={{::filter.query.lookupField}} skip-sync-documents="true" instance-id="{{filter.$$hashKey}}"
                                            filter="true" ng-change="recordSelected(item, filter)" skip-government="true" list-view="true">
                                            <select-records>
                                                <div class="color-darkgrey not" style="cursor: pointer;" ng-click="$parent.openAddDialog();">
                                                    <span ng-bind="filter.title"></span>
                                                    <span  class="fa fa-chevron-right pull-right"></span> 
                                                </div>

                                                <div ng-if="$last" ng-init="ngRepeatFinished()" style="display:none">
                                                </div>
                                            </div>
                                        </selected-records>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div ng-if="filter.type!='solrRecords' && filter.type!='date' && filter.type!='yesNo'"
                            block-region activate="filter.disabled" skip-loading-icon="true"
                            style="position: relative;">
                            <div ng-class="{'exclude-filter':filter.excludeResult}">
                                <span ng-if="filter.excludeResult" class="label label-danger"
                                    style="border-bottom: 1px solid;">NOT</span>
                                <span class="label label-info pull-right"
                                    ng-if="filter.searchRelated && hasItems(filter.selectedItems)">Search in
                                    Relation</span>
                                <div ng-repeat="option in filter.selectedItems"
                                    ng-click="removeSchemaFilters(option, filter)" class="list-group-item-expand filter"
                                    role="button" id="{{option.identifier}}" data-toggle="tooltip"
                                    data-title="{{option.title|lstring:locale}}" data-container="body"
                                    data-placement="right">
                                    <div class="label label-selected-facet" aria-hidden="false">
                                        <div class="fa fa-remove pull-right"></div>
                                        <span class="truncate">
                                            <!-- ({{searchResult.data.facets.keywords[option.id]||0}})  -->
                                            <span ng-bind="option.title|lstring:locale|limitTo:40"></span>
                                            <span ng-if="(option.title|lstring:locale).length>40">...</span>
                                        </span>
                                    </div>
                                    <div ng-if="$last" ng-init="ngRepeatFinished()" style="display:none"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
    </div>
    <br />
    <script type="text/ng-template" trados-translation="true" id="filtersDialog">
        <div class="modal-header">
            <h3 class="modal-title">
                <!-- {{schema|schemaName}} filter options for  -->
                <span ng-bind="filter.title"></span>
            </h3>
        </div>
        <div class="modal-body">	
           
            <div id="divTable"  style="max-height:480px;overflow:scroll; font-size:11px; ">               
                <div class="col-md-12">
                    <label class="pull-right">
                        <input type="checkbox" ng-model="searchRelated"> Search related
                    </label>
                    <div km-term-check ng-model="treeViewSelected" terms="treeOptions()" binding-type="term[]" 
                        enable-search="false" before-search="onBeforeSearch(keyword)"></div>
                    
                </div>
            </div>
        </div>
        <div class="modal-footer" style=" background:#f0f0f0">
            <button type="button" class="btn btn-default" aria-label="Close" ng-click="closeDialog()" ng-disabled="loading">Cancel</button>
            <button type="button" class="btn btn-primary pull-left" ng-click="applyFilter()">Apply</button>
        </div>
    </script>
</div>
