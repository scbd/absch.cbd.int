<div ng-controller="urlPdfViewer" style="margin-left:10%;margin-right:10%">
    <style>
        pdfviewer canvas {
            margin: auto;
            max-width: 100% !important;
            border-bottom: 1px solid #ddd
        }

        #viewPdf {
            position: inherit !important;
            min-height: 1000px;
        }
    </style>
    <br>
    <div class="row">
        <div class="col-xs-12 col-md-9">
            <h1 style="padding:0;margin:0;"><a class="color-black" ng-href="{{pdf.src}}">{{pdf.fileName|uppercase}}</a>
            </h1>
            <div style="font-size:18px;">Language: <span style="font-weight:normal!important;"> | </span><span
                    style="font-weight:normal!important;" ng-repeat="lang in ['ar', 'fr', 'en', 'es', 'ru', 'zh']">
                    <a ng-href="#" ng-click="loadLangPdf(lang)">{{lang}}</a> | </span>
            </div>
        </div>
        <div class="col-xs-12 col-md-3">
            <a ng-href="{{pdf.src}}" download="{{pdf.fileName}}" class="btn btn-success pull-right" target="_blank">
                <i class="fa fa-download"></i> Download
            </a>
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-md-12" style="border-right: 1px solid #ddd">
            <div class="file-viewer-preview file-preview">
                <div style="margin-left:50%;margin-top:5%;" ng-if="loading">
                    <i class="fa fa-spin fa-3x fa-circle-o-notch"></i>
                    <br /> loading pdf
                </div>
                <!-- <pdfjs-viewer src="{{ pdf.src }}"></pdfjs-viewer> -->
                <link rel="stylesheet" href="./viewer.css">
                <div id="viewPdf" style="min-height: 1000px;">
                </div>
            </div>
        </div>
    </div>
</div>
